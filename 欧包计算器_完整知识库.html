<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欧包架构师 v4.0 - 完整知识库版</title>
    <style>
        :root {
            --primary: #5d4037;
            --accent: #8d6e63;
            --bg: #fdfbf7;
            --success: #2e7d32;
            --warning: #f57f17;
            --info: #1976d2;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            background: var(--bg);
            color: #333;
            padding: 20px;
            line-height: 1.7;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        h1, h2, h3 { color: var(--primary); text-align: center; }
        .header-subtitle { text-align: center; color: #999; font-size: 0.9em; margin-bottom: 20px; }

        /* 标签页导航 */
        .tab-container {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn:hover { color: var(--primary); background: #f9f6f2; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9em; color: var(--primary); }
        input, select {
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(141, 110, 99, 0.1); }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #452e27);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(93, 64, 55, 0.3);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(93, 64, 55, 0.4); }

        #output { display: none; margin-top: 30px; animation: fadeIn 0.5s; }

        .recipe-card {
            background: linear-gradient(135deg, #f9f6f2, #f5f0e8);
            padding: 25px;
            border-radius: 15px;
            border-left: 6px solid var(--primary);
            margin-bottom: 25px;
        }

        .process-step { margin-bottom: 25px; padding-left: 20px; border-left: 3px solid #eee; }
        .step-header {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .step-number {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            font-weight: bold;
        }
        .sub-step {
            margin: 12px 0 12px 30px;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #f5f5f5;
        }

        .highlight { color: #b71c1c; font-weight: bold; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.8em; margin-right: 8px; margin-bottom: 5px; }
        .badge-temp { background: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; }
        .badge-time { background: #f3e5f5; color: #7b1fa2; border: 1px solid #e1bee7; }
        .badge-season { background: #fff3e0; color: #e65100; border: 1px solid #ffccbc; }

        .tip-box {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid var(--success);
        }
        .warning-box {
            background: #fff8e1;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid var(--warning);
            font-size: 0.9em;
        }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .stat-item { text-align: center; padding: 10px; background: white; border-radius: 8px; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.8em; color: #666; }

        /* 知识库问答样式 */
        .qa-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 30px; }
        .qa-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .qa-icon { font-size: 2em; }
        .qa-input-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .qa-input { flex: 1; }
        .btn-qa {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-qa:hover { background: #6d4c41; }
        .qa-result {
            background: #f9f6f2;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--accent);
            display: none;
        }
        .qa-result h4 { color: var(--primary); margin-bottom: 10px; }
        .qa-result .answer-content { line-height: 1.8; }
        .qa-result .source { font-size: 0.85em; color: #666; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--accent);
            display: none;
        }
        .loading::after {
            content: "正在搜索知识库...";
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: "正在搜索知识库."; }
            40% { content: "正在搜索知识库.."; }
            60%, 100% { content: "正在搜索知识库..."; }
        }

        /* 知识库浏览样式 */
        .kb-browser { margin-top: 20px; }
        .kb-category {
            background: #f9f6f2;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .kb-category-header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .kb-category-header:hover { opacity: 0.95; }
        .kb-category-content {
            padding: 20px;
            display: none;
        }
        .kb-category-content.show { display: block; }
        .kb-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }
        .kb-item-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; }
        .kb-item-content { font-size: 0.95em; color: #555; line-height: 1.6; }
        .kb-tags {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .kb-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .search-stats {
            background: #e3f2fd;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #1976d2;
        }

        @media (max-width: 600px) {
            .config-grid { grid-template-columns: 1fr; }
            .stat-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 12px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍞 欧包架构师 v4.0</h1>
        <p class="header-subtitle">完整知识库版 · 智能问答与知识管理</p>

        <!-- 标签页导航 -->
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('calculator')">📐 配方计算器</button>
            <button class="tab-btn" onclick="switchTab('qa')">🤖 智能问答</button>
            <button class="tab-btn" onclick="switchTab('knowledge')">📚 知识库浏览</button>
        </div>

        <!-- 计算器标签页 -->
        <div id="calculator-tab" class="tab-content active">
            <div class="config-grid">
                <div class="input-group">
                    <label>目标面粉总量 (g)</label>
                    <input type="number" id="totalFlour" value="200">
                    <small style="color: #999; font-size: 0.8em;">推荐：200g / 500g / 1000g</small>
                </div>
                <div class="input-group">
                    <label>面粉类型</label>
                    <select id="flourType">
                        <option value="high">T65 / 高筋面包粉 (80%+ 水)</option>
                        <option value="medium">T55 / 中筋粉 (70%-75% 水)</option>
                        <option value="rye">黑麦/全麦混合 (定制吸水)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>环境季节 (影响酵母比例)</label>
                    <select id="season">
                        <option value="summer">夏季 (15% 酵头 - 慢发酵控酸)</option>
                        <option value="winter">冬季 (25% 酵头 - 强化热力驱动)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>发酵方式</label>
                    <select id="proofType">
                        <option value="cold">冷藏长期发酵 (风味导向)</option>
                        <option value="room">常温快速发酵 (效率导向)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>二发策略</label>
                    <select id="proofStrategy">
                        <option value="cold">长效冷藏 (12-18h 熟化)</option>
                        <option value="room">即时常温 (1.5-3h 烘焙)</option>
                    </select>
                </div>
            </div>

            <button class="btn-main" onclick="generateExpertPlan()">🚀 构建生产级方案</button>

            <div id="output">
                <div id="recipeResult" class="recipe-card"></div>
                <div id="processResult"></div>
            </div>
        </div>

        <!-- 智能问答标签页 -->
        <div id="qa-tab" class="tab-content">
            <div class="qa-header">
                <span class="qa-icon">🤖</span>
                <h2>知识库智能问答</h2>
            </div>
            <p style="color: #666; margin-bottom: 20px;">基于您的烘焙知识库，随时提问任何关于欧包制作的问题！</p>

            <div class="qa-input-container">
                <input type="text" id="qaQuestion" class="qa-input" placeholder="例如：如何制作完美的酸种？什么是一发？..." onkeypress="handleEnter(event)">
                <button class="btn-qa" onclick="askQuestion()">🔍 提问</button>
            </div>

            <div id="qaLoading" class="loading"></div>
            <div id="qaResult" class="qa-result"></div>

            <div style="margin-top: 15px;">
                <small style="color: #999;">💡 热门问题：</small>
                <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;">
                    <button class="btn-qa" style="padding: 6px 12px; font-size: 0.9em;" onclick="quickQuestion('如何制作硬种？')">硬种制作</button>
                    <button class="btn-qa" style="padding: 6px 12px; font-size: 0.9em;" onclick="quickQuestion('什么是水解？')">水解作用</button>
                    <button class="btn-qa" style="padding: 6px 12px; font-size: 0.9em;" onclick="quickQuestion('如何判断发酵程度？')">发酵判断</button>
                    <button class="btn-qa" style="padding: 6px 12px; font-size: 0.9em;" onclick="quickQuestion('什么是Coil Fold？')">折叠技巧</button>
                    <button class="btn-qa" style="padding: 6px 12px; font-size: 0.9em;" onclick="quickQuestion('如何割包？')">割包技巧</button>
                    <button class="btn-qa" style="padding: 6px 12px; font-size: 0.9em;" onclick="quickQuestion('开放式组织如何形成？')">开放式组织</button>
                    <button class="btn-qa" style="padding: 6px 12px; font-size: 0.9em;" onclick="quickQuestion('什么是Bassinage？')">后加水技术</button>
                    <button class="btn-qa" style="padding: 6px 12px; font-size: 0.9em;" onclick="quickQuestion('如何提升风味？')">风味提升</button>
                </div>
            </div>
        </div>

        <!-- 知识库浏览标签页 -->
        <div id="knowledge-tab" class="tab-content">
            <div class="qa-header">
                <span class="qa-icon">📚</span>
                <h2>知识库浏览</h2>
            </div>
            <p style="color: #666; margin-bottom: 20px;">按类别浏览完整的烘焙知识库内容</p>
            <div class="kb-browser" id="kbBrowser"></div>
        </div>
    </div>

    <script>
        // 标签页切换
        function switchTab(tabName) {
            // 隐藏所有标签内容
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // 显示选中的标签
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            // 如果切换到知识库浏览页，初始化知识库
            if (tabName === 'knowledge') {
                initKnowledgeBase();
            }
        }

        // 计算器功能
        function generateExpertPlan() {
            const totalFlour = parseFloat(document.getElementById('totalFlour').value);
            const flourType = document.getElementById('flourType').value;
            const season = document.getElementById('season').value;
            const proofType = document.getElementById('proofType').value;
            const proofStrategy = document.getElementById('proofStrategy').value;

            // 1. 根据面粉类型确定含水量
            const hydrations = { high: 0.82, medium: 0.72, rye: 0.75 };
            let hydration = hydrations[flourType];

            // 2. 季节性酵母策略（硬种模式）
            const starterRatio = (season === 'summer') ? 0.15 : 0.25;
            const saltRatio = 0.02;

            const starterWeight = totalFlour * starterRatio;
            const starterFlour = starterWeight / 1.5;
            const starterWater = starterWeight - starterFlour;

            const mainFlour = totalFlour - starterFlour;
            const totalWater = totalFlour * hydration;
            const salt = totalFlour * saltRatio;

            // 3. Bassinage 后加水技术
            const reserveWaterRatio = hydration >= 0.80 ? 0.10 : 0.05;
            const reserveWater = totalWater * reserveWaterRatio;
            const autolyseWater = totalWater - starterWater - reserveWater;

            // 4. 渲染配方卡片
            const seasonBadge = season === 'summer' ?
                '<span class="badge badge-season">🌞 夏季控温模式</span>' :
                '<span class="badge badge-season">❄️ 冬季催化模式</span>';

            document.getElementById('recipeResult').innerHTML = `
                ${seasonBadge}
                <h3>📊 专家配方 (含水目标: ${(hydration*100).toFixed(1)}%)</h3>

                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-value">${starterWeight.toFixed(1)}g</div>
                        <div class="stat-label">硬种 (50%水)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${mainFlour.toFixed(1)}g</div>
                        <div class="stat-label">主面粉</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${(totalWater).toFixed(1)}g</div>
                        <div class="stat-label">总水量</div>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <p><b>🔹 硬种构建:</b> ${starterFlour.toFixed(1)}g 粉 + ${starterWater.toFixed(1)}g 水</p>
                    <p><b>🔹 水解阶段:</b> ${mainFlour.toFixed(1)}g 粉 + <span class="highlight">${autolyseWater.toFixed(1)}g</span> 水</p>
                    <p><b>🔹 混合阶段:</b> ${salt.toFixed(1)}g 盐 + <b>后加水 <span class="highlight">${reserveWater.toFixed(1)}g</span></b></p>
                </div>

                ${hydration >= 0.82 ? `
                <div class="warning-box">
                    ⚠️ <b>高含水面团警告:</b> ${(hydration*100).toFixed(0)}%含水量属于挑战级，建议使用Coil Fold折叠法，且必须配合强力蒸汽！
                </div>
                ` : ''}

                <div class="tip-box">
                    <strong>💡 大师要点:</strong><br>
                    • 硬种含水量固定50%，可有效降低面筋降解速率<br>
                    • 后加水(Bassinage)技术能更好地建立面筋网络<br>
                    • 盐通过电荷作用紧致面筋纤维，延后加入更佳
                </div>
            `;

            // 5. 生成动态流程
            const steps = [
                {
                    title: "酵种准备",
                    content: `使用 <b>1:2:1</b> 比例（老酵头:粉:水）构建50%含水硬种。在 ${season === 'summer' ? '24-26°C' : '26-28°C'} 环境下发酵至体积 <b>2.5倍</b>，顶端呈圆拱状。此法能获得更强酵母张力和更少酸度降解。`
                },
                {
                    title: "水解",
                    content: `将主粉(${mainFlour.toFixed(1)}g)与水解水(${autolyseWater.toFixed(1)}g)混合至无干粉。${flourType === 'high' ? '<b>建议水解60分钟</b>以软化强韧面筋。' : '水解30分钟即可。'} 此时<b>不要放盐和酵头</b>。`
                },
                {
                    title: "建立面筋",
                    content: `加入剪碎的硬种混匀。${hydration >= 0.80 ?
                        '<b>Rubaud法：</b>高含水面团需通过手部像螺旋桨一样搅拌，引入空气并初步强化连接，避免过度拉伸导致断裂。' :
                        '<b>常规揉面：</b>揉至面团产生初级弹性，能够离盆即可。'}`
                },
                {
                    title: "分段补水与加盐",
                    content: `分次加入后加水(${reserveWater.toFixed(1)}g)和盐(${salt.toFixed(1)}g)。每加一次水都要等完全吸收再加下一次。盐能通过电荷作用紧致面筋纤维，延后加入可避免过早抑制酵母活性。`
                },
                {
                    title: "一发强化",
                    content: `<span class="badge badge-temp">目标面温: 24-26°C</span> 期间进行 <b>${hydration >= 0.80 ? '4-6次 Coil Fold (线圈折叠)' : '3次 Stretch & Fold (拉伸折叠)'}</b>。${hydration >= 0.80 ?
                        '<b>Coil Fold技巧：</b>双手插入面团底部，轻轻托起向上翻折。每30分钟一次，不要拉伸过快，防止面筋断裂。' :
                        '<b>Stretch & Fold技巧：</b>从上下左右四个方向拉伸折叠，每次间隔45分钟，建立足够支撑力。'}`
                },
                {
                    title: "判定与预整形",
                    content: `观察采样瓶，体积增加约 <b>50-70%</b> 时进行预整形。面团翻转至台面，轻度收紧成圆。静置 <b>20分钟</b> 进行松弛（Benched），便于后续整形。`
                },
                {
                    title: "二发策略",
                    content: proofStrategy === 'cold' ?
                        `<b>🧊 冷藏模式：</b> 整形入篮后常温放置30分钟激发酵母，随后进入<b>4°C冰箱冷藏12-18小时</b>。此法产酸风味浓郁，且表皮易产生鱼子酱般的泡泡，极大方便割包。` :
                        `<b>🏠 常温模式：</b> 整形后在 <span class="badge badge-temp">25°C</span> 环境放置 <b>1.5-3小时</b>。使用<b>指压测试</b>：按下后缓慢回弹一半即为最佳时机。`
                },
                {
                    title: "割包与烘烤",
                    content: `<span class="badge badge-temp">预热: 250°C</span> 割刀与面团呈45°夹角，深约1cm。前20分钟保持<b>高湿度</b>（石板+产汽盘），随后降温至220°C开启热风排除水汽，烘至深琥珀色。${hydration >= 0.80 ?
                        '<br><br><b>⚠️ 高含水面团特别提醒:</b> 入炉前极易摊平，必须配合强力蒸汽支持Oven Spring！' : ''}`
                }
            ];

            let html = "<h3>🛠️ 生产级执行流程</h3>";
            steps.forEach((s, i) => {
                html += `
                    <div class="process-step">
                        <div class="step-header">
                            <div class="step-number">${i+1}</div>
                            ${s.title}
                        </div>
                        <div class="sub-step">${s.content}</div>
                    </div>
                `;
            });

                    • 原因：发酵过度、面筋强度不足<br>
                    • 解决：控制发酵时间、增强折叠<br><br>
                    <b>3. 过酸：</b><br>
                    • 原因：发酵时间过长、温度过高<br>
                    • 解决：缩短发酵时间、降低温度<br><br>
                    <b>4. 组织密实：</b><br>
                    • 原因：含水量过低、发酵不足<br>
                    • 解决：提高含水量、延长发酵<br><br>
                    <b>5. 硬皮开裂：</b><br>
                    • 原因：烘烤时无蒸汽、表皮干燥<br>
                    • 解决：增加蒸汽、控制湿度<br><br>
                    <b>6. 底部发白：</b><br>
                    • 原因：烘烤时底部接触冷源<br>
                    • 解决：使用石板、调整烤架位置`,
                tags: ['问题解决', '实用', '重要'],
                source: '欧包制作知识库'
            }
        };

        // 智能问答功能
        function handleEnter(event) {
            if (event.key === 'Enter') {
                askQuestion();
            }
        }

        function quickQuestion(question) {
            document.getElementById('qaQuestion').value = question;
            askQuestion();
        }

        function askQuestion() {
            const question = document.getElementById('qaQuestion').value.trim();
            if (!question) {
                alert('请输入您的问题！');
                return;
            }

            // 显示加载状态
            document.getElementById('qaLoading').style.display = 'block';
            document.getElementById('qaResult').style.display = 'none';

            // 模拟搜索延迟
            setTimeout(() => {
                const result = searchLocalKnowledgeBase(question);

                document.getElementById('qaLoading').style.display = 'none';
                document.getElementById('qaResult').innerHTML = `
                    <h4>📖 知识库回答</h4>
                    <div class="answer-content">${result.answer}</div>
                    <div class="source">📚 来源: ${result.source} · 相关度: ${result.score}%</div>
                `;
                document.getElementById('qaResult').style.display = 'block';
            }, 500);
        }

        function searchLocalKnowledgeBase(question) {
            const lowerQuestion = question.toLowerCase();
            let bestMatch = null;
            let bestScore = 0;

            // 将问题分词
            const questionWords = question.toLowerCase().split(/[\s，。？、！]+/).filter(w => w.length > 0);

            for (const [key, item] of Object.entries(localKnowledgeBase)) {
                let score = 0;

                // 1. 检查主关键词完全匹配
                if (lowerQuestion.includes(key)) {
                    score += 50;
                }

                // 2. 检查关键词列表匹配
                for (const keyword of item.keywords) {
                    if (lowerQuestion.includes(keyword.toLowerCase())) {
                        score += 30;
                    }
                }

                // 3. 检查问题中的词是否出现在内容中
                for (const word of questionWords) {
                    if (word.length > 1) {
                        // 标题匹配
                        if (item.title.toLowerCase().includes(word)) {
                            score += 15;
                        }
                        // 内容匹配
                        if (item.content.toLowerCase().includes(word)) {
                            score += 10;
                        }
                        // 类别匹配
                        if (word === item.category.toLowerCase()) {
                            score += 20;
                        }
                    }
                }

                // 4. 特殊短语匹配（针对常见问题）
                const specialPhrases = {
                    '高水量': ['折叠', 'bassinage', '水解'],
                    '高含水': ['折叠', 'bassinage'],
                    '面筋结构': ['折叠', 'bassinage', '水解'],
                    '建立面筋': ['折叠', 'bassinage'],
                    '加强面筋': ['折叠', 'bassinage'],
                    '强筋': ['折叠', 'bassinage']
                };

                for (const [phrase, relatedKeys] of Object.entries(specialPhrases)) {
                    if (lowerQuestion.includes(phrase) && relatedKeys.includes(key)) {
                        score += 40;
                    }
                }

                if (score > bestScore) {
                    bestScore = score;
                    bestMatch = item;
                }
            }

            // 如果找到匹配项
            if (bestMatch && bestScore >= 10) {
                return {
                    answer: `<b>${bestMatch.title}</b><br><br>${bestMatch.content}`,
                    source: bestMatch.source,
                    score: Math.min(bestScore, 100)
                };
            }

            // 没有找到匹配项，返回推荐
            return {
                answer: `您的问题："<b>${question}</b>"<br><br>
                    抱歉，知识库中没有找到完全匹配的内容。<br><br>
                    <b>建议您：</b><br>
                    • 尝试更简洁的关键词<br>
                    • 点击下方的热门问题<br>
                    • 浏览"知识库浏览"标签页查看完整内容<br>
                    • 使用以下相关主题：<br>
                    <br>
                    <span class="badge">酵种</span>
                    <span class="badge">发酵</span>
                    <span class="badge">水解</span>
                    <span class="badge">折叠</span>
                    <span class="badge">高水量</span>
                    <span class="badge">面筋</span>
                    <span class="badge">割包</span>
                    <span class="badge">烘烤</span>
                    <span class="badge">整形</span>
                    <span class="badge">风味</span>`,
                source: '推荐阅读',
                score: 0
            };
        }

        // 知识库浏览功能
        function initKnowledgeBase() {
            const kbBrowser = document.getElementById('kbBrowser');

            // 按类别组织知识库
            const categories = {};
            for (const [key, item] of Object.entries(localKnowledgeBase)) {
                if (!categories[item.category]) {
                    categories[item.category] = [];
                }
                categories[item.category].push(item);
            }

            // 生成HTML
            let html = '';
            for (const [category, items] of Object.entries(categories)) {
                html += `
                    <div class="kb-category">
                        <div class="kb-category-header" onclick="toggleCategory('${category}')">
                            <span><b>📁 ${category}</b> (${items.length} 篇)</span>
                            <span id="${category}-arrow">▼</span>
                        </div>
                        <div class="kb-category-content" id="${category}-content">
                            ${items.map(item => `
                                <div class="kb-item">
                                    <div class="kb-item-title">${item.title}</div>
                                    <div class="kb-item-content">${item.content}</div>
                                    <div class="kb-tags">
                                        ${item.tags.map(tag => `<span class="kb-tag">${tag}</span>`).join('')}
                                    </div>
                                    <div class="kb-source">📚 来源: ${item.source}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            kbBrowser.innerHTML = html;
        }

        function toggleCategory(category) {
            const content = document.getElementById(`${category}-content`);
            const arrow = document.getElementById(`${category}-arrow`);

            if (content.classList.contains('show')) {
                content.classList.remove('show');
                arrow.textContent = '▼';
            } else {
                content.classList.add('show');
                arrow.textContent = '▲';
            }
        }
    </script>
</body>
</html>
